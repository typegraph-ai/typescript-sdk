name: Benchmarks

on:
  push:
    branches-ignore: [main]
  workflow_dispatch:
    inputs:
      benchmarks:
        description: 'Comma-separated: dataset/variant[:seed] (e.g. nfcorpus/core,legal-rag-bench/neural:seed)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  parse:
    runs-on: ubuntu-latest
    if: github.actor == 'fIa5h' || github.actor == 'claude'
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      has_benchmarks: ${{ steps.parse.outputs.has_benchmarks }}
    steps:
      - name: Parse benchmark tags
        id: parse
        shell: bash
        run: |
          DATASETS="nfcorpus australian-tax-guidance-retrieval contractual-clause-retrieval license-tldr-retrieval mleb-scalr legal-rag-bench"
          VARIANTS="core neural"

          ENTRIES=()

          add_entry() {
            local ds="$1" var="$2" seed="$3"
            local timeout=15
            if [ "$seed" = "true" ] && [ "$var" = "neural" ]; then
              timeout=360
            elif [ "$seed" = "true" ]; then
              timeout=60
            elif [ "$var" = "neural" ]; then
              timeout=30
            fi
            ENTRIES+=("{\"dataset\":\"$ds\",\"variant\":\"$var\",\"seed\":$seed,\"timeout\":$timeout}")
          }

          expand_entry() {
            local ds="$1" var="$2" seed="$3"
            local ds_list="$DATASETS"
            local var_list="$VARIANTS"
            if [ "$ds" != "all" ]; then
              ds_list="$ds"
            fi
            if [ "$var" != "all" ]; then
              var_list="$var"
            fi
            for d in $ds_list; do
              for v in $var_list; do
                add_entry "$d" "$v" "$seed"
              done
            done
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.benchmarks }}"
            IFS=',' read -ra TAGS <<< "$INPUT"
            for tag in "${TAGS[@]}"; do
              tag=$(echo "$tag" | xargs)
              if [[ "$tag" =~ ^([a-z0-9-]+)/(core|neural|all)(:seed)?$ ]]; then
                ds="${BASH_REMATCH[1]}"
                var="${BASH_REMATCH[2]}"
                seed="false"
                if [ -n "${BASH_REMATCH[3]}" ]; then seed="true"; fi
                expand_entry "$ds" "$var" "$seed"
              fi
            done
          else
            MSG=$(cat <<'COMMIT_MSG'
          ${{ github.event.head_commit.message }}
          COMMIT_MSG
            )
            while IFS= read -r match; do
              if [[ "$match" =~ \[bench:([a-z0-9-]+)/(core|neural|all)(:seed)?\] ]]; then
                ds="${BASH_REMATCH[1]}"
                var="${BASH_REMATCH[2]}"
                seed="false"
                if [ -n "${BASH_REMATCH[3]}" ]; then seed="true"; fi
                expand_entry "$ds" "$var" "$seed"
              fi
            done < <(echo "$MSG" | grep -oP '\[bench:[^\]]+\]')
          fi

          if [ ${#ENTRIES[@]} -eq 0 ]; then
            echo "has_benchmarks=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "No benchmark tags found, skipping."
          else
            # Deduplicate
            UNIQUE=$(printf '%s\n' "${ENTRIES[@]}" | sort -u | paste -sd,)
            MATRIX="[${UNIQUE}]"
            echo "has_benchmarks=true" >> "$GITHUB_OUTPUT"
            echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
            echo "Benchmarks to run: ${MATRIX}"
          fi

  run:
    needs: parse
    if: needs.parse.outputs.has_benchmarks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(matrix.timeout) }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.parse.outputs.matrix) }}
    concurrency:
      group: bench-${{ matrix.dataset }}-${{ matrix.variant }}
      cancel-in-progress: true
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build --filter=@d8um/adapter-pgvector --filter=@d8um/graph
      - name: Install benchmark dependencies
        working-directory: benchmarks
        run: npm install
      - name: Run benchmark
        id: bench
        working-directory: benchmarks
        run: |
          SEED_FLAG=""
          if [ "${{ matrix.seed }}" = "true" ]; then
            SEED_FLAG="--seed"
          fi
          set +e
          npx tsx ${{ matrix.dataset }}/${{ matrix.variant }}/run.ts $SEED_FLAG 2>&1 | tee /tmp/bench-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          # Extract JSON between delimiters
          RESULT=$(sed -n '/^---BENCH_RESULT_JSON---$/,/^---END_BENCH_RESULT_JSON---$/{ /^---/d; p; }' /tmp/bench-output.txt)
          # Save to file for artifact upload and subsequent steps
          echo "$RESULT" > /tmp/bench-result.json
          exit $EXIT_CODE
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.dataset }}-${{ matrix.variant }}
          path: /tmp/bench-result.json
          if-no-files-found: ignore
          retention-days: 3
      - name: Post results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const dataset = '${{ matrix.dataset }}';
            const variant = '${{ matrix.variant }}';
            const branch = context.ref.replace('refs/heads/', '');
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            if (prs.data.length === 0) {
              console.log('No open PR for this branch, skipping comment.');
              return;
            }
            const prNumber = prs.data[0].number;

            // Read result JSON from file
            let resultJson = '';
            try {
              resultJson = fs.readFileSync('/tmp/bench-result.json', 'utf8').trim();
            } catch (e) {}

            let parsed;
            try {
              if (resultJson) parsed = JSON.parse(resultJson);
            } catch (e) {}

            // Normalize to array (runners now emit [hybrid, fast])
            const results = Array.isArray(parsed) ? parsed : parsed ? [parsed] : [];

            if (results.length === 0 || !results[0].metrics) {
              let log = '';
              try {
                const full = fs.readFileSync('/tmp/bench-output.txt', 'utf8');
                log = full.split('\n').slice(-80).join('\n').trim();
              } catch (e) {}
              const logBlock = log
                ? '\n<details><summary>Output (last 80 lines)</summary>\n\n```\n' + log + '\n```\n\n</details>'
                : '';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '## Benchmark Failed: ' + dataset + '/' + variant + '\n\nNo result JSON was produced. The benchmark likely crashed before completing.\n\n[View logs](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')' + logBlock,
              });
              return;
            }

            const seedLabel = '${{ matrix.seed }}' === 'true' ? ' (seeded)' : '';

            // Load baselines (shared across modes)
            let baselines = [];
            try {
              const bl = JSON.parse(fs.readFileSync('benchmarks/' + dataset + '/baselines.json', 'utf8'));
              baselines = bl.baselines || [];
            } catch (e) {
              console.log('No baselines.json found for ' + dataset);
            }

            const metricNames = ['nDCG@10', 'MAP@10', 'Recall@10', 'Precision@10'];
            const baselineCols = baselines.filter(b => b.metrics['nDCG@10'] != null).slice(0, 3);

            // Process each result (hybrid + fast)
            for (const result of results) {
              const m = result.metrics;
              const t = result.timing;

              // Load mode-specific history
              const historyPath = 'benchmarks/' + dataset + '/' + variant + '/history-' + result.mode + '.json';
              let history = [];
              try {
                history = JSON.parse(fs.readFileSync(historyPath, 'utf8'));
              } catch (e) {
                // Fall back to legacy history.json for first run
                try {
                  history = JSON.parse(fs.readFileSync('benchmarks/' + dataset + '/' + variant + '/history.json', 'utf8'));
                } catch (e2) {}
              }

              const prevRun = history.length > 0 ? history[history.length - 1] : null;

              let header = '| Metric | d8um |';
              let separator = '|--------|------|';
              for (const b of baselineCols) {
                header += ' ' + b.system + ' |';
                separator += '------|';
              }
              if (prevRun) {
                header += ' Δ prev |';
                separator += '--------|';
              }

              const rows = metricNames.map(metric => {
                let row = '| ' + metric + ' | **' + m[metric].toFixed(4) + '** |';
                for (const b of baselineCols) {
                  const bv = b.metrics[metric];
                  row += ' ' + (bv != null ? bv.toFixed(4) : '—') + ' |';
                }
                if (prevRun) {
                  const prev = prevRun.metrics[metric];
                  if (prev != null) {
                    const delta = m[metric] - prev;
                    const sign = delta >= 0 ? '+' : '';
                    row += ' ' + sign + delta.toFixed(4) + ' |';
                  } else {
                    row += ' — |';
                  }
                }
                return row;
              });

              const lines = [
                '## Benchmark: ' + result.benchmark + ' — ' + variant + ' (' + result.mode + ')' + seedLabel,
                '',
                header,
                separator,
                ...rows,
                '',
                '**Corpus:** ' + (result.corpus ?? 0).toLocaleString() + ' docs | **Queries:** ' + result.queries + ' | **Mode:** ' + result.mode,
              ];

              if (t.ingestionSeconds != null) {
                lines.push('**Timing:** ingest ' + t.ingestionSeconds.toFixed(1) + 's, avg query ' + t.avgQueryMs.toFixed(1) + 'ms, total ' + Math.floor(t.totalSeconds / 60) + 'm' + Math.round(t.totalSeconds % 60) + 's');
              } else {
                lines.push('**Timing:** avg query ' + t.avgQueryMs.toFixed(1) + 'ms, total ' + Math.floor(t.totalSeconds / 60) + 'm' + Math.round(t.totalSeconds % 60) + 's');
              }

              if (history.length > 0) {
                const recent = history.slice(-5).reverse();
                lines.push('', '<details><summary>Progress (last ' + Math.min(history.length, 5) + ' runs)</summary>', '');
                lines.push('| Commit | Date | nDCG@10 | Δ | Avg Query |');
                lines.push('|--------|------|---------|---|-----------|');
                for (let i = 0; i < recent.length; i++) {
                  const h = recent[i];
                  const prev = recent[i + 1];
                  let delta = '—';
                  if (prev) {
                    const d = h.metrics['nDCG@10'] - prev.metrics['nDCG@10'];
                    delta = (d >= 0 ? '+' : '') + d.toFixed(4);
                  }
                  lines.push('| ' + h.commit + ' | ' + h.date + ' | ' + h.metrics['nDCG@10'].toFixed(4) + ' | ' + delta + ' | ' + h.avgQueryMs.toFixed(1) + 'ms |');
                }
                lines.push('', '</details>');
              }

              lines.push('', '<details><summary>Full JSON</summary>', '', '```json', JSON.stringify(result, null, 2), '```', '', '</details>');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: lines.join('\n'),
              });

              // Append to mode-specific history
              const newEntry = {
                commit: context.sha.slice(0, 7),
                date: new Date().toISOString().slice(0, 10),
                metrics: m,
                avgQueryMs: t.avgQueryMs,
                mode: result.mode,
                config: result.config || {},
              };
              history.push(newEntry);
              fs.mkdirSync(path.dirname(historyPath), { recursive: true });
              fs.writeFileSync(historyPath, JSON.stringify(history, null, 2) + '\n');
            }
      - name: Commit history update
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          RESULT_FILE="/tmp/bench-result.json"
          BASE_DIR="benchmarks/${{ matrix.dataset }}/${{ matrix.variant }}"
          for attempt in 1 2 3 4 5; do
            # Always start fresh from remote
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            # Re-apply history entries on top of latest remote
            node -e "
              const fs = require('fs');
              const path = require('path');
              const parsed = JSON.parse(fs.readFileSync('$RESULT_FILE', 'utf8'));
              const results = Array.isArray(parsed) ? parsed : [parsed];
              const baseDir = '$BASE_DIR';
              for (const result of results) {
                const mode = result.mode || 'hybrid';
                const histFile = path.join(baseDir, 'history-' + mode + '.json');
                let history = [];
                try { history = JSON.parse(fs.readFileSync(histFile, 'utf8')); } catch {}
                const entry = {
                  commit: '${{ github.sha }}'.slice(0, 7),
                  date: new Date().toISOString().slice(0, 10),
                  metrics: result.metrics,
                  avgQueryMs: result.timing.avgQueryMs,
                  mode,
                  config: result.config || {},
                };
                history.push(entry);
                fs.mkdirSync(path.dirname(histFile), { recursive: true });
                fs.writeFileSync(histFile, JSON.stringify(history, null, 2) + '\n');
              }
            "
            git add "$BASE_DIR"/history-*.json
            git diff --cached --quiet && { echo "History already up to date"; exit 0; }
            git commit -m "bench: update ${{ matrix.dataset }}/${{ matrix.variant }} history [skip ci]"
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "History pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt), retrying..."
            sleep $((attempt * 2))
          done
          echo "::warning::Failed to push history update after 5 attempts"

  summary:
    needs: [parse, run]
    if: always() && needs.parse.outputs.has_benchmarks == 'true' && needs.run.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          path: /tmp/results
      - name: Post summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const resultsDir = '/tmp/results';
            if (!fs.existsSync(resultsDir)) {
              console.log('No results directory found.');
              return;
            }

            const results = [];
            for (const dir of fs.readdirSync(resultsDir)) {
              const file = path.join(resultsDir, dir, 'bench-result.json');
              if (fs.existsSync(file)) {
                try {
                  const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                  const items = Array.isArray(data) ? data : [data];
                  for (const item of items) {
                    if (item && item.metrics) results.push(item);
                  }
                } catch (e) {
                  console.log(`Skipping invalid result: ${file}`);
                }
              }
            }

            if (results.length === 0) {
              console.log('No valid results to summarize.');
              return;
            }

            const rows = results.map(r => {
              const m = r.metrics;
              const t = r.timing;
              const mode = r.mode || 'hybrid';
              return `| ${r.dataset} | ${r.variant} | ${mode} | ${m['nDCG@10'].toFixed(4)} | ${m['MAP@10'].toFixed(4)} | ${m['Recall@10'].toFixed(4)} | ${m['Precision@10'].toFixed(4)} | ${t.avgQueryMs.toFixed(1)}ms |`;
            });

            const body = [
              '## Benchmark Results Summary',
              '',
              '| Dataset | Variant | Mode | nDCG@10 | MAP@10 | Recall@10 | P@10 | Avg Query |',
              '|---------|---------|------|---------|--------|-----------|------|-----------|',
              ...rows,
              '',
              `Commit: ${context.sha.slice(0, 7)} | [Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            const branch = '${{ github.ref }}'.replace('refs/heads/', '');
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            if (prs.data.length === 0) {
              console.log('No open PR, skipping summary comment.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs.data[0].number,
              body,
            });
