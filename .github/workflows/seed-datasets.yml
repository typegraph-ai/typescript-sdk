name: Seed Datasets

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-upload even if blobs exist (true/false)'
        required: false
        default: 'false'
        type: string

jobs:
  seed:
    runs-on: ubuntu-latest
    if: github.actor == 'fIa5h' || github.actor == 'claude'
    timeout-minutes: 30
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install benchmark dependencies
        working-directory: benchmarks
        run: npm install
      - name: Seed datasets to Vercel Blob
        working-directory: benchmarks
        run: npx tsx scripts/seed-datasets.ts
